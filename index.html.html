<title>중장비 ON</title>
<style>
:root{
  --sky:#0EA5E9; --sky-d:#0284C7; --sky-l:#38BDF8;
  --emerald:#10B981; --emerald-d:#047857;
  --cobalt:#3B6BF5; --cobalt-d:#1D4ED8;
  --orange:#FF8A3D; --orange-d:#D9590A;
  --bg:#F0F6FC; --bg2:#FFFFFF;
  --ink:#0F1B2D; --sub:#64748B; --line:#E2E8F0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;
  background:radial-gradient(130% 80% at 50% 0%, #DCEEFF 0%, var(--bg) 50%);
  color:var(--ink); min-height:100dvh; max-width:520px; margin:0 auto;
  display:flex; flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 8px) 22px calc(env(safe-area-inset-bottom) + 28px);
  overflow-x:hidden;
}
button,a{font-family:inherit;cursor:pointer;text-decoration:none}

/* ===== Brand ===== */
.brand{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:42px 0 30px;flex-shrink:0}
.logo-mark{position:relative;width:84px;height:84px;border-radius:24px;
  background:linear-gradient(145deg,var(--sky-l),var(--sky-d));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 40px rgba(14,165,233,.45);margin-bottom:18px;
  animation:floaty 4s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.logo-mark svg{width:50px;height:50px}
.logo-mark .pulse{position:absolute;inset:0;border-radius:24px;border:2px solid var(--sky-l);
  animation:pulse 2.6s ease-out infinite;opacity:0}
@keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.5);opacity:0}}
.brand h1{font-size:34px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:9px;color:var(--ink)}
.brand h1 .on{background:linear-gradient(135deg,var(--sky),var(--emerald));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  position:relative}
.brand .tag{margin-top:12px;font-size:14.5px;color:var(--sub);line-height:1.6;font-weight:500}
.brand .tag b{color:var(--ink);font-weight:700}

/* ===== App cards ===== */
.apps{flex:1;display:flex;flex-direction:column;gap:16px;justify-content:center;padding:8px 0}
.app-card{position:relative;display:flex;align-items:center;gap:18px;
  padding:22px 20px;border-radius:22px;overflow:hidden;
  background:var(--bg2);border:1px solid var(--line);
  transition:.2s;
  box-shadow:0 6px 22px rgba(15,27,45,.07)}
.app-card:active{transform:scale(.98)}
.app-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px}
.app-card.market::before{background:linear-gradient(var(--cobalt),var(--cobalt-d))}
.app-card.call::before{background:linear-gradient(var(--orange),var(--orange-d))}
.app-ic{width:62px;height:62px;border-radius:18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.app-card.market .app-ic{background:linear-gradient(145deg,rgba(59,107,245,.18),rgba(29,78,216,.1));border:1px solid rgba(59,107,245,.35)}
.app-card.call .app-ic{background:linear-gradient(145deg,rgba(255,138,61,.2),rgba(217,89,10,.1));border:1px solid rgba(255,138,61,.4)}
.app-ic svg{width:34px;height:34px}
.app-body{flex:1;min-width:0}
.app-body .name{font-size:19px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px;display:flex;align-items:center;gap:7px;color:var(--ink)}
.app-body .desc{font-size:13px;color:var(--sub);line-height:1.45}
.app-go{flex-shrink:0;width:30px;height:30px;border-radius:50%;
  background:#F1F5F9;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#94A3B8}
.badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.3px}
.app-card.market .badge{background:rgba(59,107,245,.12);color:var(--cobalt-d)}
.app-card.call .badge{background:rgba(255,138,61,.14);color:var(--orange-d)}
.live-stat{margin-top:7px;font-size:11.5px;font-weight:700;color:#94A3B8;display:flex;align-items:center;gap:5px;min-height:14px}
.live-stat .dot2{width:6px;height:6px;border-radius:50%;background:var(--emerald);animation:blink 1.8s infinite}
.recent-badge{position:absolute;top:14px;right:48px;font-size:10px;font-weight:800;
  padding:3px 8px;border-radius:8px;background:rgba(255,138,61,.15);color:var(--orange-d);
  letter-spacing:.2px;display:none}
.app-card.is-recent .recent-badge{display:inline-block}
.app-card.market .live-stat b{color:var(--cobalt-d)}
.app-card.call .live-stat b{color:var(--orange-d)}


/* ===== App overlay (iframe) ===== */
.app-overlay{position:fixed;inset:0;z-index:1000;background:#fff;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.3,.8,.3,1);
  visibility:hidden}
.app-overlay.on{transform:translateX(0);visibility:visible}
.app-overlay .ov-bar{flex:0 0 auto;display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top) + 8px) 14px 8px;background:var(--bg2);
  border-bottom:1px solid var(--line)}
.app-overlay .ov-back{background:#F1F5F9;border:none;border-radius:10px;
  padding:8px 14px;font-size:14px;font-weight:800;color:var(--ink);cursor:pointer;
  display:flex;align-items:center;gap:5px;font-family:inherit}
.app-overlay .ov-back:active{transform:translateY(1px)}
.app-overlay .ov-title{font-size:15px;font-weight:800;color:var(--ink)}
.app-overlay iframe{flex:1;width:100%;border:none;background:#fff}

/* ===== Footer ===== */
.foot{text-align:center;font-size:11.5px;color:#94A3B8;margin-top:20px;flex-shrink:0;line-height:1.6}
.foot .live{display:inline-flex;align-items:center;gap:6px;color:#64748B}
.foot .dot{width:7px;height:7px;border-radius:50%;background:var(--emerald);
  animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

</div>

/* ===== 앱 전환 로직 (지연 로딩 + 슬라이드 + 뒤로가기 + 마지막앱 기억) ===== */
const _ov = document.getElementById('appOverlay');
const _frame = document.getElementById('appFrame');
const _ovTitle = document.getElementById('ovTitle');
let _curApp = null, _loaded = {market:false, call:false};

// 이벤트 바인딩 (module 스코프)
document.querySelector('.app-card.market').addEventListener('click', ()=>openApp('market'));
document.querySelector('.app-card.call').addEventListener('click', ()=>openApp('call'));
document.getElementById('ovBackBtn').addEventListener('click', ()=>closeApp());

// 마지막 사용 앱에 '최근 사용' 배지
try{
  const last = localStorage.getItem('jjon_last');
  if(last==='market'||last==='call'){
    document.querySelector('.app-card.'+last).classList.add('is-recent');
  }
}catch(e){}

function _decode(b64){ return decodeURIComponent(escape(atob(b64))); }

function openApp(which){
  const conf = which==='market'
    ? {b64:window.__APP_MARKET__, title:'🏗️ 중장비마켓'}
    : {b64:window.__APP_CALL__,   title:'🚜 장비콜'};
  _curApp = which;
  _ovTitle.textContent = conf.title;
  // 지연 로딩: 이미 그 앱이 올라가 있으면 다시 안 읽음
  if(_frame.dataset.app !== which){
    _frame.srcdoc = _decode(conf.b64);
    _frame.dataset.app = which;
  }
  _ov.classList.add('on');
  document.body.style.overflow='hidden';
  // 마지막 본 앱 기억
  try{ localStorage.setItem('jjon_last', which); }catch(e){}
  document.querySelectorAll('.app-card').forEach(c=>c.classList.remove('is-recent'));
  document.querySelector('.app-card.'+which).classList.add('is-recent');
  // 안드로이드 뒤로가기 → 홈 복귀용 history
  if(!history.state || history.state.app !== which){
    history.pushState({app:which}, '', '#'+which);
  }
}
function closeApp(fromPop){
  _ov.classList.remove('on');
  document.body.style.overflow='';
  _curApp = null;
  // 사용자가 홈 버튼으로 닫은 경우 history도 정리
  if(!fromPop && history.state && history.state.app){
    history.back();
  }
}
// 폰 뒤로가기(주소 해시 변화) → 앱 닫고 홈으로
window.addEventListener('popstate', ()=>{
  if(_ov.classList.contains('on')) closeApp(true);
});

/* ===== 시작화면 실시간 현황 (매물 수 · 접속 기사 수) ===== */
(async function loadStats(){
  const marketEl = document.getElementById('marketStat');
  const callEl = document.getElementById('callStat');
  try{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const fs = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    // 중장비마켓 (kscat-c0258) — 등록 매물 수
    try{
      const a = initializeApp({apiKey:"AIzaSyA_NfY1l44HQQ89IRLKdroUcFsDxfPNECk",projectId:"kscat-c0258"}, 'mkt');
      const snap = await fs.getDocs(fs.collection(fs.getFirestore(a),'equipment'));
      marketEl.innerHTML = `<span class="dot2"></span>현재 <b>${snap.size}대</b> 매물 등록됨`;
    }catch(e){ marketEl.textContent=''; }
    // 장비콜 (jajaecall) — 접속 중(active) 기사 수
    try{
      const b = initializeApp({apiKey:"AIzaSyAFLRHhZi3wG0EhLCANyEuUlBev3VwIIIQ",projectId:"jajaecall"}, 'call');
      const snap2 = await fs.getDocs(fs.collection(fs.getFirestore(b),'jangbi_drivers'));
      const now = Date.now(), active = snap2.docs.filter(d=>{const x=d.data();return x.active && x.ts && x.ts > now-30*60*1000;}).length;
      callEl.innerHTML = `<span class="dot2"></span>지금 <b>${active}명</b> 기사 접속 중`;
    }catch(e){ callEl.textContent=''; }
  }catch(e){ /* 오프라인: 현황 생략 */ }
})();
</script>
